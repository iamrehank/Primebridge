<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#000000" />
    <link rel="canonical" href="https://www.primebridgemkt.com/" />
    <script>
      // GitHub Pages SPA: restore path from query param set by 404.html
      (function() {
        var search = location.search;
        if (search) {
          var p = new URLSearchParams(search);
          var path = p.get('p');
          if (path) {
            history.replaceState(null, null, '/' + path.replace(/~and~/g, '&'));
          }
        }
      })();
    </script>
    <title>Primebridge Marketing Solutions</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
